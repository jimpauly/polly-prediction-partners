name: Continuous Integration

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
    paths:
      - 'webpage/services/api/backend/**'
      - '**/requirements.txt'
      - '.github/workflows/prettier.yml'

jobs:
  prettier:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.head_ref }}

      - name: Check for relevant changes
        id: changes
        uses: actions/github-script@v7
        with:
          script: |
            if (context.eventName === 'push') {
              core.setOutput('format_needed', 'true');
              return;
            }
            const files = await github.paginate(github.rest.pulls.listFiles, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.payload.pull_request.number,
            });
            const relevantFiles = files.filter(f =>
              f.filename.match(/\.(js|md|json|css)$/)
            );
            core.setOutput('format_needed', relevantFiles.length > 0 ? 'true' : 'false');

      - name: Prettify code
        if: steps.changes.outputs.format_needed == 'true'
        uses: creyD/prettier_action@v4.6
        with:
          prettier_options: --write **/*.{js,md,json,css}
          only_changed: true

  backend-tests:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: webpage/services/api/backend/requirements.txt

      - name: Install dependencies
        run: pip install -r webpage/services/api/backend/requirements.txt

      - name: Run backend unit tests
        run: |
          cd webpage/services/api
          python -m pytest backend/tests/ -v --tb=short
