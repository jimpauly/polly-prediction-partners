name: Continuous Integration
    
    on:
      push:
        branches:
          - main
      pull_request:
        branches:
          - main
    
    jobs:
      prettier:
        runs-on: ubuntu-latest
    
        steps:
          - name: Checkout
            uses: actions/checkout@v4
            with:
              fetch-depth: 0
              ref: ${{ github.head_ref }}
    
          - name: Prettify code
            uses: creyD/prettier_action@v4.6
            with:
              prettier_options: --write **/*.{js,md,json,css}
              only_changed: True
