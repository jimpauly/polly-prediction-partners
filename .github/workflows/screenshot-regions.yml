name: Smart Region Screenshots

on:
  pull_request:
    types: [opened, synchronize, reopened]
    paths:
      - 'webpage/apps/web/public/**'

permissions:
  contents: read
  pull-requests: write

jobs:
  screenshot:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Detect affected region
        id: region
        uses: actions/github-script@v7
        with:
          script: |
            const path = require('path');
            const fs   = require('fs');

            const config = JSON.parse(
              fs.readFileSync('.github/screenshot-config.json', 'utf8')
            );

            const prFiles = await github.paginate(github.rest.pulls.listFiles, {
              owner:       context.repo.owner,
              repo:        context.repo.repo,
              pull_number: context.payload.pull_request.number,
              per_page:    100,
            });

            const frontendFiles = prFiles
              .map(f => f.filename)
              .filter(f => f.startsWith('webpage/apps/web/public/'));

            core.info(`Frontend files changed: ${frontendFiles.join(', ') || '(none)'}`);

            if (frontendFiles.length === 0) {
              core.setOutput('target', 'none');
              core.setOutput('label',  'none');
              return;
            }

            const affectedRegions  = new Set();
            let   hasUnmappedFile  = false;

            for (const file of frontendFiles) {
              const basename = path.basename(file);
              let matched = false;
              for (const { pattern, regions } of config.filePatterns) {
                if (basename === pattern.replace('**/', '')) {
                  regions.forEach(r => affectedRegions.add(r));
                  matched = true;
                  break;
                }
              }
              if (!matched) hasUnmappedFile = true;
            }

            let target, label;
            if (!hasUnmappedFile && affectedRegions.size === 1) {
              target = [...affectedRegions][0];
              label  = config.regions[target].label;
            } else {
              target = 'full';
              label  = 'Full Viewport';
            }

            core.info(`Screenshot target: ${target} (${label})`);
            core.setOutput('target', target);
            core.setOutput('label',  label);

      - name: Install Playwright
        if: steps.region.outputs.target != 'none'
        run: |
          mkdir -p /tmp/pw
          cd /tmp/pw
          npm init -y
          npm install playwright@latest
          npx playwright install chromium --with-deps

      - name: Start local server
        if: steps.region.outputs.target != 'none'
        run: |
          cd webpage/apps/web/public
          python3 -m http.server 3000 &
          SERVER_READY=false
          for i in $(seq 1 15); do
            curl -sf http://localhost:3000 > /dev/null && echo "Server ready" && SERVER_READY=true && break
            sleep 1
          done
          if [ "$SERVER_READY" = "false" ]; then
            echo "ERROR: local web server failed to start within 15 seconds" >&2
            exit 1
          fi

      - name: Take screenshot
        if: steps.region.outputs.target != 'none'
        run: |
          cat > /tmp/screenshot-runner.js << 'JSEOF'
          const { chromium } = require('playwright');
          const fs = require('fs');

          const config = JSON.parse(fs.readFileSync(process.env.CONFIG_PATH, 'utf8'));
          const target = process.env.TARGET;

          (async () => {
            const browser = await chromium.launch();
            const page    = await browser.newPage();
            await page.setViewportSize({ width: 1920, height: 1080 });
            await page.goto('http://localhost:3000', { waitUntil: 'networkidle' });

            if (target !== 'full' && config.regions[target]) {
              const el = page.locator(config.regions[target].selector).first();
              await el.screenshot({ path: process.env.OUT_PATH });
            } else {
              await page.screenshot({ path: process.env.OUT_PATH });
            }

            await browser.close();
          })().catch(e => { console.error(e); process.exit(1); });
          JSEOF

          TARGET="${{ steps.region.outputs.target }}" \
          CONFIG_PATH="${GITHUB_WORKSPACE}/.github/screenshot-config.json" \
          OUT_PATH="/tmp/screenshot.png" \
          node /tmp/screenshot-runner.js
        env:
          NODE_PATH: /tmp/pw/node_modules

      - name: Upload screenshot artifact
        if: steps.region.outputs.target != 'none'
        id: upload
        uses: actions/upload-artifact@v4
        with:
          name: ui-screenshot
          path: /tmp/screenshot.png
          retention-days: 30

      - name: Post PR comment
        if: steps.region.outputs.target != 'none'
        uses: actions/github-script@v7
        with:
          script: |
            const label  = '${{ steps.region.outputs.label }}';
            const runUrl = `https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;

            await github.rest.issues.createComment({
              owner:        context.repo.owner,
              repo:         context.repo.repo,
              issue_number: context.payload.pull_request.number,
              body: [
                '## 📸 UI Screenshot',
                '',
                `**Region captured:** ${label}`,
                '',
                `[🖼️ View screenshot artifact](${runUrl})`,
                '',
                '_Screenshots are available for 30 days. Open the link → scroll to **Artifacts** → click **ui-screenshot**._',
              ].join('\n'),
            });
